name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install all dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            python3-pip \
            android-sdk \
            android-sdk-build-tools-33 \
            android-sdk-platform-tools
          
          # Instalar Buildozer
          pip install --upgrade pip
          pip install buildozer cython virtualenv
          
          # Configurar Android SDK
          export ANDROID_HOME=/usr/lib/android-sdk
          echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
          echo "/usr/lib/android-sdk/tools/bin" >> $GITHUB_PATH
          echo "/usr/lib/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "/usr/lib/android-sdk/build-tools/33.0.2" >> $GITHUB_PATH
          
          # Verificar instalación
          which aidl || echo "aidl not found, checking alternatives..."
          find /usr -name "aidl" 2>/dev/null || echo "aidl not found"
      
      - name: Build APK
        run: |
          buildozer -v android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: predictor-pro-apk
          path: ./bin/*.apk
