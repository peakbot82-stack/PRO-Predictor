name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            aapt \
            aidl \
            zipalign \
            python3-pip \
            python3-venv
      
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv
      
      - name: Setup Android SDK
        run: |
          # Instalar sdkmanager
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk
          cd /home/runner/.buildozer/android/platform/android-sdk
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools latest
          cd latest
          yes | ./bin/sdkmanager --licenses
          ./bin/sdkmanager "build-tools;33.0.2" "platforms;android-33" "platform-tools"
      
      - name: Set Android environment
        run: |
          export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH" >> $GITHUB_PATH
      
      - name: Build APK
        run: |
          buildozer -v android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: predictor-pro-apk
          path: ./bin/*.apk
